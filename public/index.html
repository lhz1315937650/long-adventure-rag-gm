<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>长期冒险 RAG GM</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div>
          <h1>长期冒险 RAG GM</h1>
          <p id="world-line">本地世界运行中</p>
        </div>
        <div class="top-actions">
          <button id="export-btn" class="ghost-btn">导出</button>
          <button id="reset-btn" class="danger-btn">重置</button>
        </div>
      </header>

      <section class="settings-panel">
        <div class="field">
          <label for="provider-mode">智能体模式</label>
          <select id="provider-mode">
            <option value="openai-compatible">OpenAI 兼容接口</option>
            <option value="custom-json">自定义 Agent JSON</option>
            <option value="mock">本地演示模式</option>
          </select>
        </div>
        <div class="field">
          <label for="base-url">API 地址</label>
          <input id="base-url" placeholder="https://api.example.com/v1" />
        </div>
        <div class="field">
          <label for="model">模型 / Agent</label>
          <input id="model" placeholder="gpt-4.1-mini 或你的 Agent 模型名" />
        </div>
        <div class="field">
          <label for="api-key">玩家 API Key</label>
          <input id="api-key" type="password" autocomplete="off" placeholder="只发送给本地后端，不写入服务器文件" />
        </div>
        <label class="checkline">
          <input id="save-key" type="checkbox" />
          <span>保存在此浏览器</span>
        </label>
      </section>

      <main id="root"></main>
    </div>

    <template id="stat-input-template">
      <label class="stat-input">
        <span></span>
        <input type="number" min="0" step="1" value="0" />
      </label>
    </template>

    <script src="/app.js" type="module"></script>
  </body>
</html>
